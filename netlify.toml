[build]
  publish = "public"
  command = "hugo --gc --minify"
  functions = "netlify/functions"

[build.environment]
  HUGO_VERSION = "0.157.0"

[context.production.environment]
  HUGO_ENV = "production"

[[redirects]]
  from = "/2018/*"
  to = "/posts/:splat"
  status = 301

[[redirects]]
  from = "/2019/*"
  to = "/posts/:splat"
  status = 301

